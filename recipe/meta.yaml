{% set version = "5.15.8" %}
{% set library = "Library/" if (target_platform == "win-64") else "" %}

package:
  name: qt-main
  version: {{ version }}

source:
  - url: https://download.qt.io/official_releases/qt/{{ version.rpartition('.')[0] }}/{{ version }}/single/qt-everywhere-opensource-src-{{ version }}.tar.xz
    sha256: 776a9302c336671f9406a53bd30b8e36f825742b2ec44a57c08217bff0fa86b9
    patches:
      # qtbase
      - patches/0001-qtbase-osx-allow-any-xcrun-in-PATH.patch
      - patches/0002-qtbase-use-better-clang-optimize-size.patch
      - patches/0003-qtbase-never-enable-new-dtags.patch
      - patches/0004-qtbase-fix-harcoded-sysroot-paths.patch
      - patches/0005-qtbase-fix-internal-mimetypes-db-on-windows.patch

      # The following patches are required to cross-compile Qt host tools (osx)
      # to work both on x86_64 and arm64
      - patches/0006-Add-arm64-support-for-host-tools.patch             # [arm64]
      - patches/0007-Enable-arm64-x86_64-support-for-qttools.patch      # [arm64]
      - patches/0008-Make-qml-host-tools-to-be-arm64-compatible.patch   # [arm64]
      - patches/0009-Make-repc-arm64-compatible.patch                   # [arm64]
      # - patches/0010-Enable-arm64-support-for-qgltf.patch               # [arm64]
      - patches/0011-Enable-arm64-support-for-qscxmlc.patch             # [arm64]

      # Patch for c++11 compatibility
      - patches/0012-include-utility-in-mbgl-util-unique_any.patch

      # Patch for openssl 3 compatibility, picked up from ubuntu, see
      # https://git.launchpad.net/ubuntu/+source/qtbase-opensource-src/commit/?h=applied/ubuntu/devel&id=6f147c166539b23792515445beadc02fb5565d0c
      - patches/0013-upstream-fixes-to-support-OpenSSL-3.0.patch

      # This helps compatibility between qt and CXX17
      # https://github.com/conda-forge/qt-main-feedstock/pull/136
      # https://github.com/conda-forge/libcxx-feedstock/issues/114#issuecomment-1490672500
      - patches/0014-remove-usage-of-unary-operator.patch

      # https://github.com/xkbcommon/libxkbcommon/blob/6073565903488cb5b9a8d37fdc4a7c2f9d7ad04d/NEWS#L11
      # https://gitlab.freedesktop.org/xorg/proto/xorgproto/-/merge_requests/70
      - patches/0015-remove-deleted-xkb-keys.patch

  - url: https://download.qt.io/development_releases/prebuilt/llvmpipe/windows/opengl32sw-64-mesa_12_0_rc2.7z     # [win64]
    sha256: 2a0d2f92c60e0962ef5f6039d3793424c6f39e49ba27ac04a5b21ca4ae012e15                                      # [win64]
    folder: opengl32sw                                                                                            # [win64]

build:
  number: 19
  detect_binary_files_with_prefix: true
  missing_dso_whitelist:  # [osx]
    - /usr/lib/libbsm.0.dylib  # [osx]
    - /usr/lib/libcups.2.dylib  # [osx]
    - /usr/lib/libresolv.9.dylib  # [osx]
    - /usr/lib/libsandbox.1.dylib  # [osx]
    - '/System/Library/Frameworks/CoreLocation.framework/**'  # [osx]

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - sysroot_linux-64 2.17              # [linux]
    - {{ cdt('mesa-libgl-devel') }}      # [linux]
    - {{ cdt('mesa-libegl-devel') }}     # [linux]
    - {{ cdt('mesa-dri-drivers') }}      # [linux]
    - {{ cdt('libdrm-devel') }}          # [linux]
    - {{ cdt('libglvnd-glx') }}          # [linux]
    - {{ cdt('libglvnd-egl') }}          # [linux]
    # For fontconfig + freetype
    - pkg-config                         # [unix]
    - make                               # [unix]
    - ninja
    - ruby >=2.5                         # [linux]
    - bison                              # [linux]
    - flex                               # [linux]
    - gperf                              # [linux]
    - m2-gperf                           # [win]
    - m2-bison                           # [win]
    - m2-flex                            # [win]
    - m2-patch                           # [win]
    - jom                                # [win]
    - curl                               # [win]
    - perl 5
    # Add openssl to build requirements so that it gets
    # pinned correctly during the 1 -> 3 migration
    - openssl                            # [not osx]
    # libclang is required in order to enable simultaneous x86_64 and
    # arm64 support for QDoc
    - libclang                           # [arm64]
    # Although these should be host-only dependencies, they are needed when
    # cross-compiling arm64 binaries on x86_64 since llvm-config (host/arm64)
    # cannot be executed on x86_64 to locate libclang successfully
    - llvmdev                           # [arm64]
    # pin llvm<16 because of: https://bugreports.qt.io/browse/PYSIDE-2288
    - clangdev >=9, <16                 # [arm64]
  host:
    # For pkg-config gl, fontconfig + freetype
    - pthread-stubs                      # [linux]
    - dbus                               # [linux]
    - fontconfig                         # [linux]
    - freetype                           # [linux]
    - glib
    - gst-plugins-base  {{ gstreamer }}
    - gstreamer
    - pulseaudio-client                  # [linux]
    - libxml2                            # [linux]
    - libxkbcommon                       # [linux]
    - expat                              # [linux]
    - libevent                           # [linux]
    - icu
    - libjpeg-turbo
    - libpng
    - nspr                               # [unix]
    - nss                                # [unix]
    - libsqlite
    - mysql-devel                        # [not win]
    - postgresql                         # [not win]
    - zlib
    - libxcb                             # [linux]
    - openssl                            # [not osx]
    # For QDoc
    # http://doc.qt.io/Qt-5/qdoc-guide-clang.html
    # Only libclang is needed, but needs the full package for detection.
    - llvmdev
    # pin llvm<16 because of: https://bugreports.qt.io/browse/PYSIDE-2288
    - clangdev >=9, <16
    # Ensure that build and host have the same clang version on osx
    # otherwise qt6 may be out of sync compared to the pinned compiler
    # version
    - libclang {{ cxx_compiler_version }}  # [osx]
    - libclang                             # [not osx]
    - libcups                            # [linux]
    - zstd
    - alsa-lib                           # [linux]
    - krb5
    - harfbuzz                           # [linux]
    # The xcb-util packages are necessary to build the Qt xcb plugin.
    # It was decided to not use CDTs for qt to resolve issues
    # that may exhibit as segfault due to missing libraries
    # in some lighter weight linux installations
    # https://github.com/conda-forge/qt-main-feedstock/issues/32
    - xcb-util                           # [linux]
    - xcb-util-wm                        # [linux]
    - xcb-util-keysyms                   # [linux]
    - xcb-util-image                     # [linux]
    - xcb-util-renderutil                # [linux]
    - xorg-libx11                        # [linux]
    - xorg-libxext                       # [linux]
    - xorg-libxdamage                    # [linux]
    - xorg-libsm                         # [linux]
    - xorg-libice                        # [linux]
    # https://github.com/conda-forge/staged-recipes/pull/22084
    - xorg-libxxf86vm                    # [linux]
    - xorg-xf86vidmodeproto              # [linux]
  run:
    - {{ pin_compatible("nss") }}        # [unix]
    - {{ pin_compatible("nspr") }}       # [unix]
    - libxcb                             # [linux]
    # Adding the following xcb-util run requirements resolves issue
    # that may exhibit as segfault due to missing libraries
    # in some lighter weight linux installations
    # https://github.com/conda-forge/qt-main-feedstock/issues/32
    - xcb-util-wm                        # [linux]
    - xcb-util-keysyms                   # [linux]
    - xcb-util-image                     # [linux]
    - xcb-util-renderutil                # [linux]
    # no run_export
    - xorg-libsm                         # [linux]
    - xorg-libice                        # [linux]
    - xorg-xf86vidmodeproto              # [linux]
    - {{ pin_compatible("libclang") }}
  run_constrained:
    - __osx >={{ MACOSX_DEPLOYMENT_TARGET|default("10.14") }}  # [osx and x86_64]
    - qt {{ version }}

outputs:

  # Everything except shared libraries in lib and plugins
  - name: qt-main
    build:
      detect_binary_files_with_prefix: true
      run_exports:
        - {{ pin_subpackage('libqt5', max_pin='x.x') }}
    files:
      - {{ library }}bin/Assistant.app                                        # [osx]
      - {{ library }}bin/Designer.app                                         # [osx]
      - {{ library }}bin/Linguist.app                                         # [osx]
      - {{ library }}bin/pixeltool.app                                        # [osx]
      - {{ library }}bin/qdbusviewer.app                                      # [osx]
      - {{ library }}bin/qml.app                                              # [osx]
      - {{ library }}bin/xc-avoidance                                         # [osx]
      - {{ library }}bin/assistant*                                           # [not osx]
      - {{ library }}bin/balsam*
      - {{ library }}bin/canbusutil*
      - {{ library }}bin/designer*                                            # [not osx]
      - {{ library }}bin/dumpcpp*                                             # [win]
      - {{ library }}bin/dumpdoc*                                             # [win]
      - {{ library }}bin/fixqt4headers.pl*
      - {{ library }}bin/idc*                                                 # [win]
      - {{ library }}bin/lconvert*
      - {{ library }}bin/libEGL.dll                                           # [win]
      - {{ library }}bin/libGLESv2.dll                                        # [win]
      - {{ library }}bin/linguist*                                            # [not osx]
      - {{ library }}bin/lprodump*
      - {{ library }}bin/lrelease*
      - {{ library }}bin/lupdate*
      - {{ library }}bin/mac*qt                                               # [osx]
      - {{ library }}bin/meshdebug*
      - {{ library }}bin/moc*
      - {{ library }}bin/opengl32sw.dll                                       # [win]
      - {{ library }}bin/pixeltool*                                           # [not osx]
      - {{ library }}bin/q*
      - {{ library }}bin/rcc*
      - {{ library }}bin/repc*
      - {{ library }}bin/syncqt.pl*
      - {{ library }}bin/testcon*                                             # [win]
      - {{ library }}bin/tracegen*
      - {{ library }}bin/uic*
      - {{ library }}bin/windeployqt*                                         # [win]
      - {{ library }}bin/xmlpatterns*
      - {{ library }}doc/config/*qdocconf
      - {{ library }}doc/global
      - {{ library }}include/qt
      - {{ library }}lib/cmake/Qt*/**/*
      - {{ library }}lib/metatypes/qt*
      - {{ library }}lib/pkgconfig/Qt*
      - {{ library }}lib/libQt*{{ SHLIB_EXT }}                                # [unix]
      - {{ library }}lib/libQt*.prl                                           # [unix]
      - {{ library }}lib/libQt*.a                                             # [unix]
      - {{ library }}lib/libEGL.*                                             # [win]
      - {{ library }}lib/libGLESv2.*                                          # [win]
      - {{ library }}lib/Qt*                                                  # [win]
      - {{ library }}lib/qt*                                                  # [win]
      - {{ library }}mkspecs
      - {{ library }}phrasebooks
      - {{ library }}qml
      - {{ library }}share/qt
      - {{ library }}translations/*.qm
    test:
      requires:
        - {{ compiler('cxx') }}
        - {{ cdt('mesa-libgl-devel') }}      # [linux]
        - {{ cdt('mesa-libegl-devel') }}     # [linux]
        - {{ cdt('mesa-dri-drivers') }}      # [linux]
        - {{ cdt('libdrm-devel') }}          # [linux]
        - {{ cdt('libglvnd-glx') }}          # [linux]
        - {{ cdt('libglvnd-egl') }}          # [linux]
        - make                               # [unix]
        - xcb-util                           # [linux]
        - xorg-libxdamage                    # [linux]
        # https://github.com/conda-forge/staged-recipes/pull/22084
        - xorg-libxxf86vm                    # [linux]
      files:
        - test/hello.pro
        - test/main-qtwebengine.cpp
        - test/main.cpp
        - test/main.qml
        - test/qml.qrc
        - test/qrc_qml.cpp
        - test/qtwebengine.pro
        - test/test_qmimedatabase.pro
        - test/test_qmimedatabase.cpp
        - xcodebuild
        - xcrun

  # Only what's needed for run_exports downstream
  - name: libqt5
    build:
      detect_binary_files_with_prefix: true
      run_exports:
        - {{ pin_subpackage('libqt5', max_pin='x.x') }}
    requirements:
      build:
        - {{ compiler('c') }}
        - {{ compiler('cxx') }}
        - sysroot_linux-64 2.17              # [linux]
        - {{ cdt('mesa-libgl-devel') }}      # [linux]
        - {{ cdt('mesa-libegl-devel') }}     # [linux]
        - {{ cdt('mesa-dri-drivers') }}      # [linux]
        - {{ cdt('libdrm-devel') }}          # [linux]
        - {{ cdt('libglvnd-glx') }}          # [linux]
        - {{ cdt('libglvnd-egl') }}          # [linux]
        # Add openssl to build requirements so that it gets
        # pinned correctly during the 1 -> 3 migration
        - openssl                            # [not osx]
      host:
        - alsa-lib                           # [linux]
        - dbus                               # [linux]
        - fontconfig                         # [linux]
        - freetype                           # [linux]
        - glib
        - gst-plugins-base  {{ gstreamer }}
        - gstreamer
        - harfbuzz                           # [linux]
        - icu
        - krb5
        - libcups                            # [linux]
        - libjpeg-turbo
        - libpng
        - libsqlite
        - libxcb                             # [linux]
        - libxkbcommon                       # [linux]
        - mysql-devel                        # [not win]
        - openssl                            # [not osx]
        - postgresql                         # [not win]
        - pthread-stubs                      # [linux]
        - pulseaudio-client                  # [linux]
        - xcb-util-image                     # [linux]
        - xcb-util-keysyms                   # [linux]
        - xcb-util-renderutil                # [linux]
        - xcb-util-wm                        # [linux]
        - xorg-libice                        # [linux]
        - xorg-libsm                         # [linux]
        - xorg-libx11                        # [linux]
        - xorg-libxdamage                    # [linux]
        - xorg-libxext                       # [linux]
        - xorg-libxxf86vm                    # [linux]
        - xorg-xf86vidmodeproto              # [linux]
        - zlib
        - zstd
      run:
        - libxcb                             # [linux]
        - xcb-util-image                     # [linux]
        - xcb-util-keysyms                   # [linux]
        - xcb-util-renderutil                # [linux]
        - xcb-util-wm                        # [linux]
        - xorg-libice                        # [linux]
        - xorg-libsm                         # [linux]
        - xorg-xf86vidmodeproto              # [linux]
      run_constrained:
        - __osx >={{ MACOSX_DEPLOYMENT_TARGET|default("10.14") }}  # [osx and x86_64]
        - qt {{ version }}
    files:
      - {{ library }}plugins
      - lib/libQt5*.so.5*                                                     # [linux]
      - lib/libQt5*.5*.dylib                                                  # [osx]
      - Library/bin/Qt5*.dll                                                  # [win]

about:
  home: https://qt.io
  license: LGPL-3.0-only
  license_file: LICENSE.LGPLv3
  summary: 'Qt is a cross-platform application and UI framework.'
  description: |
    Qt helps you create connected devices, UIs & applications that run
    anywhere on any device, on any operating system at any time.
  doc_url: https://doc.qt.io/
  dev_url: https://github.com/qt

extra:
  recipe-maintainers:
    - andfoy
    - ccordoba12
    - duncanmmacleod
    - gillins
    - mingwandroid
    - msarahan
    - ocefpaf
    - stuarteberg
    - Tobias-Fischer
    - matthiasdiener  # (currently building linux_ppc64le manually)
    - jschueller
  feedstock-name: qt-main
